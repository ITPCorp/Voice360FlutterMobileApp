plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'org.jetbrains.kotlin.android'
    id "com.google.gms.google-services"
    id 'dev.flutter.flutter-gradle-plugin'
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.appicator.itp_voice"
    compileSdk = 35

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                def storeFilePath = keystoreProperties['storeFile']
                def resolved = file(storeFilePath)
                if (!resolved.exists()) {
                    resolved = rootProject.file("../upload-keystore.jks")
                }
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile resolved
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.appicator.itp_voice"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode 101
        versionName "1.2.1"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.1.1')
    implementation "androidx.fragment:fragment:1.3.6"
    implementation 'com.google.firebase:firebase-analytics'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

tasks.whenTaskAdded { task ->
    if (task.name.startsWith('process') && task.name.endsWith('GoogleServices')) {
        task.dependsOn 'preBuild'
    }
}
